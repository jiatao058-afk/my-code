<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Translator - qwen2.5:7b</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 24px;
}
.container { width: 100%; max-width: 1000px; }
h1 {
  text-align: center;
  font-size: 1.6rem;
  margin-bottom: 8px;
  color: #f8fafc;
}
.subtitle {
  text-align: center;
  color: #94a3b8;
  margin-bottom: 28px;
  font-size: 0.9rem;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 20px;
  background: #1e293b;
  border-radius: 10px;
  padding: 4px;
}
.tab {
  flex: 1;
  padding: 10px 16px;
  border: none;
  background: transparent;
  color: #94a3b8;
  font-size: 0.95rem;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.2s;
}
.tab.active { background: #3b82f6; color: #fff; }
.tab:hover:not(.active) { color: #e2e8f0; }

/* Panels */
.panel { display: none; }
.panel.active { display: block; }

/* Controls */
.controls {
  display: flex;
  gap: 10px;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.controls select, .controls input[type="text"] {
  padding: 8px 12px;
  border: 1px solid #334155;
  border-radius: 8px;
  background: #1e293b;
  color: #e2e8f0;
  font-size: 0.9rem;
  outline: none;
}
.controls select:focus, .controls input:focus { border-color: #3b82f6; }
.lang-arrow { color: #64748b; font-size: 1.1rem; }

/* Textareas */
textarea {
  width: 100%;
  min-height: 200px;
  padding: 16px;
  border: 1px solid #334155;
  border-radius: 10px;
  background: #1e293b;
  color: #e2e8f0;
  font-size: 0.95rem;
  line-height: 1.6;
  resize: vertical;
  outline: none;
  font-family: inherit;
}
textarea:focus { border-color: #3b82f6; }
textarea[readonly] { background: #1a2332; }

.url-input-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}
.url-input-row input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid #334155;
  border-radius: 8px;
  background: #1e293b;
  color: #e2e8f0;
  font-size: 0.95rem;
  outline: none;
}
.url-input-row input:focus { border-color: #3b82f6; }

/* Buttons */
.btn {
  padding: 10px 24px;
  border: none;
  border-radius: 8px;
  font-size: 0.95rem;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
}
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-secondary { background: #334155; color: #e2e8f0; }
.btn-secondary:hover { background: #475569; }

/* Page content */
.page-content {
  margin-top: 20px;
}
.page-content h3 {
  font-size: 1rem;
  margin-bottom: 12px;
  color: #f8fafc;
}
.paragraph-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
  align-items: start;
}
.paragraph-box {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 0.9rem;
  line-height: 1.6;
  min-height: 40px;
}
.paragraph-box .tag-label {
  font-size: 0.7rem;
  color: #64748b;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.paragraph-box .text { color: #e2e8f0; }
.paragraph-box .translated { color: #93c5fd; }

/* Status */
.status {
  text-align: center;
  padding: 12px;
  color: #64748b;
  font-size: 0.85rem;
}
.status.error { color: #f87171; }
.status.success { color: #4ade80; }

/* Spinner */
.spinner {
  display: inline-block;
  width: 16px; height: 16px;
  border: 2px solid #334155;
  border-top-color: #3b82f6;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Responsive */
@media (max-width: 700px) {
  .paragraph-row { grid-template-columns: 1fr; }
  .controls { flex-direction: column; align-items: stretch; }
}
</style>
</head>
<body>
<div class="container">
  <h1>Web Translator</h1>
  <p class="subtitle">Powered by Ollama — qwen2.5:7b</p>

  <div class="tabs">
    <button class="tab active" data-panel="text-panel">文本翻译</button>
    <button class="tab" data-panel="url-panel">网页翻译</button>
  </div>

  <!-- TEXT MODE -->
  <div id="text-panel" class="panel active">
    <div class="controls">
      <select id="text-source-lang">
        <option value="auto">自动检测</option>
        <option value="Chinese">Chinese</option>
        <option value="English">English</option>
        <option value="Japanese">Japanese</option>
        <option value="Korean">Korean</option>
        <option value="French">French</option>
        <option value="German">German</option>
        <option value="Spanish">Spanish</option>
        <option value="Russian">Russian</option>
      </select>
      <span class="lang-arrow">→</span>
      <select id="text-target-lang">
        <option value="Chinese" selected>Chinese</option>
        <option value="English">English</option>
        <option value="Japanese">Japanese</option>
        <option value="Korean">Korean</option>
        <option value="French">French</option>
        <option value="German">German</option>
        <option value="Spanish">Spanish</option>
        <option value="Russian">Russian</option>
      </select>
      <button class="btn btn-primary" id="btn-translate" onclick="doTranslate()">翻译</button>
    </div>
    <textarea id="text-input" placeholder="在此粘贴要翻译的文字..."></textarea>
    <div id="text-status" class="status"></div>
    <textarea id="text-output" placeholder="翻译结果将显示在此处..." readonly></textarea>
  </div>

  <!-- URL MODE -->
  <div id="url-panel" class="panel">
    <div class="url-input-row">
      <input type="text" id="url-input" placeholder="输入要翻译的网页 URL...">
      <button class="btn btn-primary" id="btn-fetch" onclick="doFetch()">抓取页面</button>
    </div>
    <div class="controls" style="margin-top:12px;">
      <select id="url-source-lang">
        <option value="auto">自动检测</option>
        <option value="Chinese">Chinese</option>
        <option value="English" selected>English</option>
        <option value="Japanese">Japanese</option>
        <option value="Korean">Korean</option>
        <option value="French">French</option>
        <option value="German">German</option>
        <option value="Spanish">Spanish</option>
        <option value="Russian">Russian</option>
      </select>
      <span class="lang-arrow">→</span>
      <select id="url-target-lang">
        <option value="Chinese" selected>Chinese</option>
        <option value="English">English</option>
        <option value="Japanese">Japanese</option>
        <option value="Korean">Korean</option>
        <option value="French">French</option>
        <option value="German">German</option>
        <option value="Spanish">Spanish</option>
        <option value="Russian">Russian</option>
      </select>
      <button class="btn btn-primary" id="btn-translate-all" onclick="doTranslateAll()">全部翻译</button>
    </div>
    <div id="url-status" class="status"></div>
    <div id="page-content" class="page-content"></div>
  </div>
</div>

<script>
// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.panel).classList.add('active');
  });
});

let pageData = null;

async function doTranslate() {
  const text = document.getElementById('text-input').value.trim();
  if (!text) return;

  const btn = document.getElementById('btn-translate');
  const status = document.getElementById('text-status');
  const output = document.getElementById('text-output');

  btn.disabled = true;
  status.innerHTML = '<span class="spinner"></span> 翻译中...';
  status.className = 'status';

  try {
    const resp = await fetch('/api/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text,
        source_lang: document.getElementById('text-source-lang').value,
        target_lang: document.getElementById('text-target-lang').value
      })
    });
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.detail || '翻译失败');
    }
    const data = await resp.json();
    output.value = data.translated_text;
    status.innerHTML = '翻译完成';
    status.className = 'status success';
  } catch (e) {
    status.innerHTML = '错误：' + e.message;
    status.className = 'status error';
  } finally {
    btn.disabled = false;
  }
}

async function doFetch() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;

  const btn = document.getElementById('btn-fetch');
  const status = document.getElementById('url-status');
  const content = document.getElementById('page-content');

  btn.disabled = true;
  status.innerHTML = '<span class="spinner"></span> 抓取页面中...';
  status.className = 'status';
  content.innerHTML = '';

  try {
    const resp = await fetch('/api/fetch-page', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
    if (!resp.ok) {
      const err = await resp.json();
      throw new Error(err.detail || '抓取失败');
    }
    pageData = await resp.json();
    renderPageContent();
    status.innerHTML = `已抓取：《${pageData.title}》（${pageData.paragraphs.length} 个文本块）`;
    status.className = 'status success';
  } catch (e) {
    status.innerHTML = '错误：' + e.message;
    status.className = 'status error';
  } finally {
    btn.disabled = false;
  }
}

function renderPageContent() {
  const content = document.getElementById('page-content');
  let html = '';
  if (pageData.title) {
    html += `<h3>${escapeHtml(pageData.title)}</h3>`;
  }
  pageData.paragraphs.forEach((p, i) => {
    html += `<div class="paragraph-row">
      <div class="paragraph-box">
        <div class="tag-label">${p.tag}</div>
        <div class="text">${escapeHtml(p.text)}</div>
      </div>
      <div class="paragraph-box" id="trans-${i}">
        <div class="tag-label">译文</div>
        <div class="translated" id="trans-text-${i}">—</div>
      </div>
    </div>`;
  });
  content.innerHTML = html;
}

async function doTranslateAll() {
  if (!pageData || !pageData.paragraphs.length) return;

  const btn = document.getElementById('btn-translate-all');
  const status = document.getElementById('url-status');
  const sourceLang = document.getElementById('url-source-lang').value;
  const targetLang = document.getElementById('url-target-lang').value;

  btn.disabled = true;
  status.innerHTML = '<span class="spinner"></span> 翻译中...';
  status.className = 'status';

  const batchSize = 3;
  const paragraphs = pageData.paragraphs;

  try {
    for (let i = 0; i < paragraphs.length; i += batchSize) {
      const batch = paragraphs.slice(i, i + batchSize);
      const batchNum = Math.floor(i / batchSize) + 1;
      const totalBatches = Math.ceil(paragraphs.length / batchSize);
      status.innerHTML = `<span class="spinner"></span> 正在翻译第 ${batchNum}/${totalBatches} 批...`;

      const results = await Promise.all(
        batch.map((p, j) => {
          const idx = i + j;
          return fetch('/api/translate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: p.text, source_lang: sourceLang, target_lang: targetLang })
          }).then(r => r.json()).then(d => ({ idx, text: d.translated_text }))
           .catch(() => ({ idx, text: '[翻译失败]' }));
        })
      );

      for (const r of results) {
        document.getElementById('trans-text-' + r.idx).textContent = r.text;
      }
    }
    status.innerHTML = '全部翻译完成';
    status.className = 'status success';
  } catch (e) {
    status.innerHTML = '错误：' + e.message;
    status.className = 'status error';
  } finally {
    btn.disabled = false;
  }
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// Enter key in text input triggers translate
document.getElementById('text-input').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') doTranslate();
});

document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doFetch();
});
</script>
</body>
</html>
